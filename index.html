<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="出荷検品">
  <title>HYOGO PARTS 出荷検品</title>
  <link rel="stylesheet" href="./style.css?v=20260717-1">
</head>
<body>
<main id="app">
<section id="loginView" class="view active">
  <h1>HYOGO PARTS 出荷検品</h1>
  <label class="label">社員番号</label>
  <input id="staffCodeInput" class="input big" inputmode="numeric" pattern="[0-9]*" autocomplete="off" readonly>

<div class="keypad staffKeypad">
  <button data-staffkey="1">1</button><button data-staffkey="2">2</button><button data-staffkey="3">3</button>
  <button data-staffkey="4">4</button><button data-staffkey="5">5</button><button data-staffkey="6">6</button>
  <button data-staffkey="7">7</button><button data-staffkey="8">8</button><button data-staffkey="9">9</button>
  <button data-staffkey="clear">C</button><button data-staffkey="0">0</button><button data-staffkey="back">←</button>
</div>

<button id="loginBtn" class="btn primary">開始</button>
  <p id="loginMsg" class="msg"></p>
</section>

<section id="loadView" class="view">
  <h1>CSV読込</h1>
  <p class="note">PCで作成した検品用CSVを1つだけ選択してください。</p>
  <label class="fileLabel">inspection_bundle.csv
    <input id="bundleFile" type="file" accept=".csv,text/csv">
  </label>
  <div class="loadedList">
    <div class="small">選択されたCSV</div>
    <ul id="loadedCsvList"><li>未選択</li></ul>
  </div>
  <button id="loadCsvBtn" class="btn primary">検品開始</button>
  <p id="loadMsg" class="msg"></p>
</section>

<section id="scanInvoiceView" class="view">
  <h1>送り状読込</h1>
  <p id="staffNameLabel" class="staff"></p>
  <button id="changeStaffBtn" class="btn smallBtn">作業者変更</button>
  <label class="label">送り状No</label>
  <input
    id="invoiceInput"
    class="input big"
    type="text"
    inputmode="text"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >
  <button id="invoiceSearchBtn" class="btn primary">表示</button>
  <button id="reloadBtn" class="btn">CSV再読込</button>
  <p id="invoiceMsg" class="msg"></p>
</section>

<section id="orderView" class="view">
  <header class="header">
  <div>
    <div class="small">送り状No</div>
    <div id="orderInvoice" class="strong"></div>
  </div>

  <div>
    <div class="small">注文番号</div>
    <div id="orderNo" class="strong"></div>
  </div>

  <div>
    <div class="small">氏名</div>
    <div id="orderShipName" class="strong"></div>
  </div>
</header>
  <p id="orderStaffLabel" class="staff"></p>
  <button id="changeStaffBtnOrder" class="btn smallBtn">作業者変更</button>
  <div id="progressLabel" class="progress"></div>
  <div id="itemList" class="itemList"></div>
  <button id="startInspectionBtn" class="btn primary">検品開始</button>
  <button id="backToInvoiceBtn" class="btn">送り状読込へ戻る</button>
</section>

<section id="itemView" class="view">
<div class="itemInfoBox">
  <div><strong>送り状No：</strong><span id="itemInvoice"></span></div>
  <div><strong>注文番号：</strong><span id="itemOrderNo"></span></div>
  <div><strong>氏名：</strong><span id="itemShipName"></span></div>
</div>
  <div class="imageWrap"><img id="itemImage" alt="商品画像"><div id="noImage" class="noImage">画像なし</div></div>
  <div id="itemSku" class="sku"></div>
  <div id="itemQty" class="qty"></div>
  <div id="itemName" class="itemName"></div>
  <p id="itemStaffLabel" class="staff smallStaff"></p>
  <button id="changeStaffBtnItem" class="btn smallBtn">作業者変更</button>
  <div class="readBox"><div class="small">読取値</div><div id="readValue" class="readValue">スキャン待機中</div></div>
  <input
  id="barcodeInput"
  class="hiddenInput"
  type="text"
  inputmode="none"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>
  <p id="itemMsg" class="msg"></p>
  <div id="quantityPanel" class="quantityPanel hidden">
    <div class="small">数量確認</div>
    <div class="needed">必要数量：<span id="neededQty"></span></div>
    <input id="checkedQtyInput" class="input qtyInput" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="確認数量">
    <div class="keypad">
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
      <button data-key="clear">C</button><button data-key="0">0</button><button data-key="back">←</button>
    </div>
    <button id="confirmQtyBtn" class="btn primary">確定</button>
  </div>
  <button id="manualBtn" class="btn">手動確認</button>
  <button id="holdBtn" class="btn danger">保留</button>
  <button id="toOrderBtn" class="btn">一覧へ戻る</button>
</section>

<section id="completeView" class="view">
  <h1 id="completeTitle">検品完了</h1>
  <p id="completeSummary" class="summary"></p>

  <div class="resultStatusBox">
    <div class="small">端末内保存件数</div>
    <div id="localResultCount" class="strong">0件</div>

    <div class="small">CSV未出力件数</div>
    <div id="unsavedResultCount" class="strong">0件</div>
  </div>

  <button id="nextInvoiceBtn" class="btn next-action">
  次の送り状へ
</button>

<button id="saveResultBtn" class="btn">
  途中保存
</button>

<button id="clearLocalResultsBtn" class="btn danger clear-results">
  PC取込済みデータをクリア
</button>


  <p id="saveMsg" class="msg"></p>
</section>
</main>

<div id="modal" class="modal hidden">
  <div class="modalCard">
    <h2 id="modalTitle"></h2>
    <div id="modalBody"></div>
    <div id="modalActions" class="modalActions"></div>
  </div>
</div>
<script src="./app.js?v=20260722-7"></script>
</body>
</html>
